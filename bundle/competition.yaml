# Main settings
title: Onera-468-crm-wall-distribution-regression-v2.1
version: 2 # this means that it is a Codabench bundle
description: Alpha type ScientificML Benchmark
image: logo.png
registration_auto_approve: True  # do not require approval from organizers to join
docker_image: codalab/codalab-legacy:py312 # the Docker image in which submissions are run
enable_detailed_results: True
# Documentation web pages
terms: pages/terms.md
pages:
  - title: Overview
    file: pages/overview.md
  - title: Data
    file: pages/data.md
  - title: Evaluation
    file: pages/evaluation.md
# Definition of the tasks
tasks:
  - index: 0
    name: Development Task (first version)
    description: 'Development phase: create models and submit them to obtain feedback.'
    is_public: true
    # input_data: feedback_phase/input_data
    # reference_data: feedback_phase/reference_data
    scoring_program: scoring_program
    ingestion_program: ingestion_program
  - index: 1
    name: Final Task (first version)
    description: 'Final phase: submissions from the previous phase are automatically
      cloned and used to compute the final score. The results on the test set will be
      revealed when the organizers make them available.'
    is_public: false
    # input_data: final_phase/input_data
    # reference_data: final_phase/reference_data
    scoring_program: scoring_program
    ingestion_program: ingestion_program

# /!\ Solution is an example submission, NOT the ground truth /!\
solutions:
  - index: 0
    tasks:
      - 0
      - 1
    path: solution/
# There are 2 phases: development phase and final phase
# Each one is linked to a task
phases:
  - index: 0
    name: Development
    description: 'Development phase: create models and submit them to obtain feedback.
      You can make 5 submissions per day and 100 submissions in total.'
    start: 1-1-2024 # Month/Day/Year
    end: 12-30-2026
    max_submissions_per_day: 5
    max_submissions: 100
    execution_time_limit: 3600
    tasks:
      - 0
    solutions: []
    starting_kit: starting_kit
  - index: 1
    name: Final
    description: 'Final phase: submissions from the previous phase are automatically
      cloned and used to compute the final score. The results on the test set will be
      revealed when the organizers make them available.'
    start: 2-1-2030 # Never ends
    max_submissions_per_day: 500
    max_submissions: 5000
    execution_time_limit: 3600
    tasks:
      - 1
    solutions: []
# Fact sheets to add more information in the leaderboard
fact_sheet: {
  "method_name": {
    "key": "method_name",
    "type": "text",
    "title": "Method name",
    "selection": "",
    "is_required": "false",
    "is_on_leaderboard": "false"
  }
 }
# Leaderboard
leaderboards:
  - index: 0
    title: Results
    key: Results
    submission_rule: "Force_Last"
    columns:
      - title: Score
        key: score
        index: 0
        sorting: desc
      - title: R2
        key: R2
        index: 1
        sorting: desc
      - title: wrMAE
        key: wrMAE
        index: 2
        sorting: asc
      - title: Duration
        key: duration
        index: 3
        sorting: asc